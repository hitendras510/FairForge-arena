name: Deploy to HuggingFace Space

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Sync to HuggingFace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history needed for HF sync
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name  "GitHub Actions"

          git remote add hf https://AbhishekGupta0164:${HF_TOKEN}@huggingface.co/spaces/AbhishekGupta0164/Meta-AI-OpenEnv-SST-Project || true

          git push hf main --force
