name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Torch CPU & SB3
        run: |
          pip install --upgrade pip
          pip install torch torchvision torchaudio stable-baselines3 --index-url https://download.pytorch.org/whl/cpu

      - name: Install requirements
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t safetyguard-x:ci .

      - name: Smoke test – health endpoint
        run: |
          docker run -d --name sgx-ci -p 7860:7860 safetyguard-x:ci
          sleep 10
          curl --retry 6 --retry-delay 3 --retry-connrefused -f http://localhost:7860/health
          docker stop sgx-ci
